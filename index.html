<!-- ★追加：Tesseract -->
<script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>

<script>
const SECTORS = ['景気敏感','エネルギー・資源','生活・ディフェンシブ','医療・ヘルスケア','金融・不動産','ハイテク'];
let records = [];
let editingId = null;

const IS_ARTIFACT = !!window.storage;

/* ストレージ */
async function storageGet(key) {
  if (IS_ARTIFACT) {
    try { const r = await window.storage.get(key); return r ? r.value : null; } catch(e) { return null; }
  }
  return localStorage.getItem(key);
}
async function storageSet(key, value) {
  if (IS_ARTIFACT) {
    try { await window.storage.set(key, value); return; } catch(e) {}
  }
  localStorage.setItem(key, value);
}

async function loadRecords() {
  const raw = await storageGet('sectorGame_v2');
  records = raw ? JSON.parse(raw) : [];
  render();
}
async function save() {
  await storageSet('sectorGame_v2', JSON.stringify(records));
}

/* OCR 初期化（ブラウザOKに変更） */
function initOcr() {
  const dz = document.getElementById('dropZone');

  dz.addEventListener('dragover', e => { e.preventDefault(); dz.classList.add('dragover'); });
  dz.addEventListener('dragleave', () => dz.classList.remove('dragover'));
  dz.addEventListener('drop', e => {
    e.preventDefault(); dz.classList.remove('dragover');
    const f = e.dataTransfer.files[0];
    if (f && f.type.startsWith('image/')) processImage(f);
  });
}

function handleScreenshot(input) {
  if (input.files[0]) processImage(input.files[0]);
}

/* ★ここだけ完全差し替え（Tesseract版） */
function processImage(file) {
  const preview = document.getElementById('previewImg');
  const status = document.getElementById('ocrStatus');
  const picks = document.getElementById('ocrPicks');

  picks.style.display = 'none';

  const reader = new FileReader();

  reader.onload = async (e) => {
    preview.src = e.target.result;
    preview.style.display = 'block';

    status.textContent = '🔍 読み取り中（無料OCR）...';
    status.className = 'ocr-status loading';

    try {
      const { data } = await Tesseract.recognize(
        e.target.result,
        'jpn+eng'
      );

      const text = data.text;
      console.log(text);

      const lines = text.split('\n');
      let results = [];
      let current = null;

      lines.forEach(line => {
        line = line.trim();

        if (line.match(/\d{3,4}/)) {
          current = { ticker: line };
        }

        if (line.includes('現買')) {
          if (current) current.type = 'buy';
        }

        if (line.match(/\d+株/)) {
          const num = parseInt(line);
          if (current) current.shares = num;
        }

        if (line.match(/円/)) {
          const price = parseFloat(line.replace(/[^\d.]/g, ''));
          if (current) {
            current.price = price;
            results.push(current);
            current = null;
          }
        }
      });

      const buys = results.filter(r => r.type === 'buy');

      if (buys.length === 0) {
        status.textContent = '⚠️ 現買が見つかりません';
        status.className = 'ocr-status error';
        return;
      }

      window._ocrBuys = buys;

      document.getElementById('pickList').innerHTML = buys.map((item, i) => {
        const total = (item.price || 0) * (item.shares || 1);

        return `
        <div class="pick-item">
          <div class="pick-info">
            <div class="pname">${item.ticker}</div>
            <div class="pmeta">${item.shares || 1}株 × ¥${item.price} = ¥${Math.round(total)}</div>
          </div>
          <span class="pick-badge badge-buy">現買</span>
          <button class="btn-pick" onclick="pickOcr(${i})">登録</button>
        </div>`;
      }).join('');

      picks.style.display = 'block';
      status.textContent = `✅ ${buys.length}件読み取りました`;
      status.className = 'ocr-status success';

    } catch (err) {
      console.error(err);
      status.textContent = '❌ OCR失敗';
      status.className = 'ocr-status error';
    }
  };

  reader.readAsDataURL(file);
}

function pickOcr(i) {
  const item = window._ocrBuys[i];
  if (!item) return;

  const total = (item.price || 0) * (item.shares || 1);

  document.getElementById('ticker').value = item.ticker || '';
  document.getElementById('buyPrice').value = Math.round(total) || '';
  document.getElementById('buyDate').value = new Date().toISOString().split('T')[0];
}

/* 初期化 */
document.getElementById('buyDate').value = new Date().toISOString().split('T')[0];
initOcr();
loadRecords();
</script>
